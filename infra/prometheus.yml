global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "task-queue-api"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+).*"
        replacement: "${1}"

  - job_name: "worker-1"
    static_configs:
      - targets: ["worker-1:9090"]
    labels:
      worker: "worker-1"

  - job_name: "worker-2"
    static_configs:
      - targets: ["worker-2:9090"]
    labels:
      worker: "worker-2"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
