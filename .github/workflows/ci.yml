name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/distributed-task-queue

jobs:
  # ── API: Build & Test ──────────────────────────────────────────────────────
  api-test:
    name: API — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskqueue_test
          POSTGRES_USER: taskqueue
          POSTGRES_PASSWORD: taskqueue
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build & test
        run: mvn clean verify
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: taskqueue_test
          DB_USER: taskqueue
          DB_PASSWORD: taskqueue
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api/target/surefire-reports/

  # ── Worker: Lint & Test ────────────────────────────────────────────────────
  worker-test:
    name: Worker — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 pytest

      - name: Lint with flake8
        run: flake8 worker.py --max-line-length=120 --ignore=E501,W503

      - name: Syntax check
        run: python -m py_compile worker.py && echo "✓ Syntax OK"

  # ── Dashboard: Build ───────────────────────────────────────────────────────
  dashboard-build:
    name: Dashboard — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install & build
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dashboard/build/

  # ── Docker Build & Push ────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [api-test, worker-test, dashboard-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./python-worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Integration Test ───────────────────────────────────────────────────────
  integration-test:
    name: Integration — Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [api-test, worker-test, dashboard-build]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build postgres redis api
        timeout-minutes: 10

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "API healthy"; break
            fi
            echo "Waiting... ($i/30)"; sleep 5
          done

      - name: Smoke test — submit job
        run: |
          JOB=$(curl -sf -X POST http://localhost:8080/api/v1/jobs \
            -H "Content-Type: application/json" \
            -d '{"type":"data_processing","payload":"{\"records\":10}","priority":"HIGH"}')
          echo "Job created: $JOB"
          JOB_ID=$(echo $JOB | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          
          # Verify job exists
          STATUS=$(curl -sf http://localhost:8080/api/v1/jobs/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Job status: $STATUS"
          
          # Verify stats endpoint
          curl -sf http://localhost:8080/api/v1/jobs/stats | python3 -m json.tool

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Teardown
        if: always()
        run: docker compose down -v
